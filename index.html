<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phantom Read — an isolation-level sandbox</title>
    <meta
      name="description"
      content="Run two transactions, pick isolation levels, and watch dirty reads, phantom reads, and write skew happen step by step on a real MVCC engine."
    />
    <!-- Favicon: coral phantom glyph on prussian drafting paper (generated, no binary asset). -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d1b2a'/%3E%3Cpath d='M9 22V13a7 7 0 0 1 14 0v9l-2.3-1.8L18.4 22l-2.4-1.8L13.6 22l-2.3-1.8z' fill='%23ff6b57'/%3E%3Ccircle cx='13' cy='14' r='1.4' fill='%230d1b2a'/%3E%3Ccircle cx='19' cy='14' r='1.4' fill='%230d1b2a'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./src/ui/styles.css" />
  </head>
  <body>
    <header class="masthead">
      <div class="wordmark">
        <span class="wordmark__glyph" aria-hidden="true">◈</span>
        <span class="wordmark__name">Phantom<span class="wordmark__accent">Read</span></span>
      </div>
      <p class="tagline">A two-transaction sandbox for database isolation levels</p>
      <button
        id="mute"
        class="mute"
        type="button"
        aria-pressed="false"
        aria-label="Toggle sound"
        title="Toggle sound"
      >
        <span class="mute__icon" aria-hidden="true">♪</span>
        <span class="mute__label">Sound</span>
      </button>
    </header>

    <main id="app" class="app" aria-label="Isolation-level sandbox">
      <aside class="rail" id="rail" aria-label="Controls"></aside>
      <section class="stage" id="stage" aria-label="Transaction timeline"></section>
      <aside class="panel" id="panel" aria-label="What just happened"></aside>
    </main>

    <div id="callout" class="callout" role="status" aria-live="polite" hidden></div>

    <footer class="colophon">
      <span>Simulated MVCC · no server, no database — just the semantics.</span>
      <a href="https://github.com/ctkrug/phantom-read" class="colophon__link">Source</a>
    </footer>

    <noscript>
      <p class="noscript">Phantom Read needs JavaScript to run its live MVCC engine.</p>
    </noscript>

    <script type="module" src="./src/ui/app.js"></script>
  </body>
</html>
